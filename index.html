<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feyza & Doğan Düğün Albümü</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f7f4f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    text-align:center;
}

.upload{
    display:inline-block;
    padding:20px 25px;
    background:#e6dccf;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
}

input{
    display:none;
}

#status{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>💍 Feyza & Doğan</h1>

<p>Anılarınızı bizimle paylaşın ❤️</p>

<label class="upload">
📷 Fotoğraf Çek / 🖼️ Galeriden Seç
<input type="file" id="fileInput" accept="image/*">
</label>

<div id="status"></div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzP2L0uF-wYAjPXDTAmPZCVl17p-8uszDXBEpHKLbW9ah7_1uhqIRKrqgUUojhFYB6Ggw/exec";

document.getElementById("fileInput").addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if (!file) return;

    document.getElementById("status").innerHTML =
    "⏳ Fotoğraf yükleniyor...";

    const reader = new FileReader();

    reader.onload = async () => {

        const base64 = reader.result.split(",")[1];

        try {

            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    image: base64
                })
            });

            const text = await response.text();

            console.log(text);

            document.getElementById("status").innerHTML =
            "✅ Fotoğraf başarıyla yüklendi";

        } catch (err) {

            console.error(err);

            document.getElementById("status").innerHTML =
            "❌ Hata: " + err.message;
        }
    };

    reader.readAsDataURL(file);

});

</script>

</body>
</html>
