<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmet & Feyza Düğün Albümü</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f7f4f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    margin-bottom:15px;
}

p{
    margin-bottom:30px;
}

.upload{
    display:inline-block;
    padding:20px 25px;
    background:#e6dccf;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
}

input{
    display:none;
}

#status{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>💍 Ahmet & Feyza</h1>

<p>Anılarınızı bizimle paylaşın ❤️</p>

<label class="upload">
📷 Fotoğraf Çek / 🖼️ Galeriden Seç
<input type="file" id="fileInput" accept="image/*">
</label>

<div id="status"></div>

</div>

<script>

document.getElementById("fileInput").addEventListener("change", async function(e){

    const file = e.target.files[0];

    if(!file) return;

    document.getElementById("status").innerHTML =
    "⏳ Fotoğraf yükleniyor...";

    const reader = new FileReader();

    reader.onload = async function(){

        const base64 = reader.result.split(",")[1];

        try{

            const response = await fetch(
                "https://script.google.com/macros/s/AKfycbzP2L0uF-wYAjPXDTAmPZCVl17p-8uszDXBEpHKLbW9ah7_1uhqIRKrqgUUojhFYB6Ggw/exec",
                {
                    method: "POST",
                    body: JSON.stringify({
                        image: base64
                    })
                }
            );

            const result = await response.text();

            console.log(result);

            document.getElementById("status").innerHTML =
            "✅ Fotoğraf başarıyla yüklendi";

        }
        catch(error){

            console.error(error);

            document.getElementById("status").innerHTML =
            "❌ Bağlantı hatası";

        }

    };

    reader.readAsDataURL(file);

});

</script>

</body>
</html>
