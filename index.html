<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmet & Feyza Düğün Albümü</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f4f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:350px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.15);
text-align:center;
}

h1{
margin-bottom:20px;
}

p{
margin-bottom:30px;
}

.upload-btn{
display:inline-block;
padding:18px 25px;
background:#e8dfd2;
border-radius:15px;
cursor:pointer;
font-size:22px;
}

input{
display:none;
}

#sonuc{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>💍 Ahmet & Feyza</h1>

<p>Anılarınızı bizimle paylaşın ❤️</p>

<label class="upload-btn">
📷 Fotoğraf Çek / 🖼️ Galeriden Seç
<input
type="file"
accept="image/*"
onchange="yukle(this.files[0])">
</label>

<div id="sonuc"></div>

</div>

<script>

async function yukle(file){

document.getElementById("sonuc").innerHTML =
"⏳ Fotoğraf yükleniyor...";

const reader = new FileReader();

reader.onload = async function(){

try{

const base64 = reader.result.split(",")[1];

await fetch(
"https://script.google.com/macros/s/AKfycbzP2L0uF-wYAjPXDTAmPZCVl17p-8uszDXBEpHKLbW9ah7_1uhqIRKrqgUUojhFYB6Ggw/exec",
{
method:"POST",
body:JSON.stringify({
image:base64
})
}
);

document.getElementById("sonuc").innerHTML =
"✅ Fotoğraf başarıyla yüklendi";

}
catch(error){

document.getElementById("sonuc").innerHTML =
"❌ Yükleme hatası oluştu";

console.error(error);

}

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
